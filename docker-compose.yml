version: '3.8'
services:
  frontend:
    build: ./packages/cli
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - webaiide

  backend:
    build: ./packages/server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-webaiide}:${POSTGRES_PASSWORD:-webaiide}@db:5432/${POSTGRES_DB:-webaiide}
      REDIS_URL: redis://redis:6379
    depends_on:
      - db
      - redis
    networks:
      - webaiide

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-webaiide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webaiide}
      POSTGRES_DB: ${POSTGRES_DB:-webaiide}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - webaiide

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - webaiide

networks:
  webaiide:
    driver: bridge

volumes:
  pgdata:
  redis_data:
